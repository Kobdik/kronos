syntax = "proto3";

package kronstub;

option go_package = ".;kronstub";

// cells stream
service Kron {
    // get ready
    rpc Ready(EmptyReq) returns (Cell) {}
    // returns stream of cells
    rpc Band (EmptyReq) returns (stream Cell) {}
}

// Empty request band of cells
message EmptyReq {}

// Cell for multi dimensional analysis
message Cell {
    repeated string keys = 1;
    sint32 val = 2;
    optional string id = 3;
    string cmd = 4;
    sint32 day = 5;
    optional string mdt = 6;
    optional sint64 dms = 7;
}